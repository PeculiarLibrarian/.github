name: PADI Global Agent Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    if: contains(github.event.issue.labels.*.name, 'agent-review-pending')
    strategy:
      # Fail-fast: false ensures one region's error doesn't kill the whole fleet
      fail-fast: false 
      matrix:
        agent: [AU-9.1, DE-9.2, NL-9.3, UK-9.4, CH-9.5, MENA-9.6]
        include:
          - agent: AU-9.1
            region: "Australia (Sydney/Melbourne/Brisbane)"
          - agent: DE-9.2
            region: "Germany (Munich/Berlin/Hamburg)"
          - agent: NL-9.3
            region: "Netherlands (Amsterdam/Eindhoven/Utrecht)"
          - agent: UK-9.4
            region: "UK (London/Cambridge/Manchester)"
          - agent: CH-9.5
            region: "Switzerland (Zurich/Basel/Geneva)"
          - agent: MENA-9.6
            region: "MENA (Dubai/Abu Dhabi/Riyadh)"

    runs-on: ubuntu-latest
    steps:
      - name: "Activate Scout ${{ matrix.agent }}"
        uses: actions/github-script@v7
        env:
          SCOUT_UNIT: ${{ matrix.agent }}
          TARGET_REGION: ${{ matrix.region }}
        with:
          script: |
            const issueNumber = context.issue.number;
            const body = `### 👋 PADI Agent Acknowledgment: Unit ${process.env.SCOUT_UNIT}
            I am **Scout Alpha-9**, specifically unit **${process.env.SCOUT_UNIT}**, now active in the **${process.env.TARGET_REGION}** corridor.
            
            **Mission Parameters:** - Verifying semantic alignment for: *${context.payload.issue.title}*
            - Handshake Protocol: Heuristic Discovery (Depth 2)
            - Target: Top-Tier Path Positioning
            
            **Expected Latency:** The Architect in Nairobi will be notified once the cross-border validation is complete.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body
            });
